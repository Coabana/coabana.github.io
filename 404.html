<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Coabana</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #07131d;
      color: #eaf4f4;
      font-family: "Segoe UI", system-ui, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 460px; }
    .code {
      font-size: 5rem;
      font-weight: 700;
      background: linear-gradient(92deg, #2fd6c3, #4cc9f0);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    h1 { font-size: 1.3rem; margin: 10px 0 6px; }
    p { color: #93adbc; margin-bottom: 26px; }
    a {
      display: inline-block;
      color: #05242a;
      background: linear-gradient(92deg, #2fd6c3, #4cc9f0);
      text-decoration: none;
      font-weight: 600;
      padding: 12px 26px;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div aria-hidden="true" style="font-size:2.6rem">🌴</div>
    <div class="code">404</div>
    <h1>Esta página se la llevó la marea</h1>
    <p>This page drifted away with the tide.</p>
    <a href="/">Volver a Coabana · Back home</a>
  </div>
</body>
</html>
